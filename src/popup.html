<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { width: 240px; font-family: system-ui, -apple-system, sans-serif; background: #0c2341; color: #fff; }

      .header { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 10px; }
      .header h1 { font-size: 14px; font-weight: 600; }
      .header p { font-size: 11px; opacity: 0.4; margin-top: 1px; }

      .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

      .row { display: flex; align-items: center; justify-content: space-between; }
      .label { font-size: 10px; opacity: 0.45; text-transform: uppercase; letter-spacing: 0.5px; }
      .value { font-size: 12px; opacity: 0.8; }

      .status { display: flex; align-items: center; gap: 7px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #f87171; flex-shrink: 0; }
      .dot.connected { background: #4ade80; }
      .dot.connecting { background: #fbbf24; animation: pulse 1s infinite; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

      .divider { height: 1px; background: rgba(255,255,255,0.07); }

      .not-detected {
        padding: 20px 16px; text-align: center;
        font-size: 12px; opacity: 0.5; line-height: 1.6;
      }

      button {
        width: 100%; padding: 7px;
        background: rgba(255,255,255,0.08); border: none; border-radius: 8px;
        color: rgba(255,255,255,0.6); font-size: 11px; cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: rgba(255,255,255,0.13); }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <h1>innoScoop</h1>
        <p>AI Browser Bridge</p>
      </div>
    </div>

    <div id="detected">
      <div class="body">
        <div class="row">
          <span class="label">Status</span>
          <div class="status">
            <div class="dot" id="dot"></div>
            <span id="statusText">Connecting…</span>
          </div>
        </div>

        <div class="divider"></div>

        <div class="row">
          <span class="label">Platform</span>
          <span class="value" id="serverUrl">—</span>
        </div>
        <div class="row">
          <span class="label">Active Chat</span>
          <span class="value" id="chatId">None</span>
        </div>

        <div class="divider"></div>

        <button id="disconnectBtn">Reset Connection</button>
      </div>
    </div>

    <div id="notDetected" style="display:none">
      <div class="not-detected">
        Open the Innovation Platform<br />to activate innoScoop.
      </div>
    </div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
