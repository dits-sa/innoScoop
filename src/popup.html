<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap');

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 260px;
        font-family: 'IBM Plex Sans Arabic', Tahoma, system-ui, sans-serif;
        background: #0c2341;
        color: #fff;
        direction: rtl;
      }

      /* ── Header ── */
      .header {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo { width: 36px; height: 36px; flex-shrink: 0; }
      .header-text h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.1px; }
      .header-text p  { font-size: 11px; opacity: 0.4; margin-top: 2px; }

      /* ── Body ── */
      .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

      .row { display: flex; align-items: center; justify-content: space-between; }
      .lbl { font-size: 10px; opacity: 0.45; }
      .val { font-size: 12px; font-weight: 500; }

      /* ── Status dot ── */
      .status { display: flex; align-items: center; gap: 7px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #f87171; flex-shrink: 0; }
      .dot.connected  { background: #4ade80; }
      .dot.connecting { background: #fbbf24; animation: pulse 1s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

      /* ── Active chat badge ── */
      .badge {
        display: inline-block;
        background: rgba(139,132,215,0.2);
        color: #cfccef;
        font-size: 11px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 20px;
      }

      .divider { height: 1px; background: rgba(255,255,255,0.07); }

      /* ── Not detected ── */
      .not-detected {
        padding: 24px 16px;
        text-align: center;
        font-size: 12px;
        opacity: 0.5;
        line-height: 1.8;
      }

      /* ── Button ── */
      button {
        width: 100%; padding: 8px;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        color: rgba(255,255,255,0.55);
        font-family: inherit;
        font-size: 11px;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: rgba(255,255,255,0.12); }

      /* ── Lavender accent bar ── */
      .accent { height: 2px; background: linear-gradient(90deg, #8b84d7, transparent); }
    </style>
  </head>

      <div class="header-text">
        <h1>مساعد الابتكار</h1>
        <p>innoScoop • مساعد المتصفح</p>
      </div>
    </div>

    <!-- Detected: on the platform -->
    <div id="detected">
      <div class="body">
        <div class="row">
          <span class="lbl">الحالة</span>
          <div class="status">
            <span id="statusText">جاري الاتصال…</span>
            <div class="dot" id="dot"></div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="row">
          <span class="lbl">المنصة</span>
          <span class="val" id="serverUrl">—</span>
        </div>

        <div class="row">
          <span class="lbl">المحادثة النشطة</span>
          <span class="badge" id="chatId">لا يوجد</span>
        </div>

        <div class="divider"></div>

        <button id="disconnectBtn">إعادة تعيين الاتصال</button>
      </div>
    </div>

    <!-- Not detected: on another site -->
    <div id="notDetected" style="display:none">
      <div class="not-detected">
        افتح منصة الابتكار<br />لتفعيل مساعد المتصفح
      </div>
    </div>
