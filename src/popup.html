<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { width: 280px; font-family: system-ui, -apple-system, sans-serif; background: #0c2341; color: #fff; }

      .header { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
      .header p { font-size: 11px; opacity: 0.45; margin-top: 2px; }

      .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

      .status-row { display: flex; align-items: center; justify-content: space-between; }
      .status { display: flex; align-items: center; gap: 7px; font-size: 12px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #f87171; flex-shrink: 0; }
      .dot.connected { background: #4ade80; }
      .dot.connecting { background: #fbbf24; animation: pulse 1s infinite; }
      .chat-tag { font-size: 10px; background: rgba(139,132,215,0.25); color: #cfccef; padding: 2px 6px; border-radius: 10px; }

      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

      label { font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.6px; display: block; margin-bottom: 4px; }

      input {
        width: 100%; padding: 7px 10px;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 8px; color: #fff; font-size: 12px; outline: none;
      }
      input::placeholder { opacity: 0.35; }
      input:focus { border-color: #8b84d7; }

      .actions { display: flex; gap: 8px; }
      button {
        flex: 1; padding: 8px;
        background: #8b84d7; border: none; border-radius: 8px;
        color: #fff; font-size: 12px; font-weight: 500; cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: #7a73c6; }
      button.secondary { background: rgba(255,255,255,0.08); }
      button.secondary:hover { background: rgba(255,255,255,0.13); }
      button:disabled { opacity: 0.45; cursor: default; }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>innoScoop</h1>
      <p>Innovation Platform Bridge</p>
    </div>
    <div class="body">
      <div class="status-row">
        <div class="status">
          <div class="dot" id="dot"></div>
          <span id="statusText">Disconnected</span>
        </div>
        <span class="chat-tag" id="chatTag" style="display:none"></span>
      </div>

      <div>
        <label>Server URL</label>
        <input id="serverUrl" type="url" placeholder="https://your-app.com" />
      </div>
      <div>
        <label>Ably Public Key</label>
        <input id="ablyKey" type="text" placeholder="xxxxx.xxxxx" />
      </div>

      <div class="actions">
        <button id="connectBtn">Connect</button>
        <button id="disconnectBtn" class="secondary" style="display:none">Disconnect</button>
      </div>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
